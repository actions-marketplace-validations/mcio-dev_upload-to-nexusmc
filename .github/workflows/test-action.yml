name: 'Test Upload to NexusMC Action'

on:
  workflow_dispatch:
    inputs:
      resource_id:
        description: 'NexusMC Resource ID'
        required: true
        type: string
      version:
        description: 'Version to set'
        required: true
        type: string

jobs:
  test-upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build action
        run: |
          npm install
          npm run build

      - name: Upload to NexusMC
        uses: ./
        with:
          api_token: ${{ secrets.NEXUSMC_API_TOKEN }}
          resource_id: ${{ github.event.inputs.resource_id }}
          file_path: action.yml
          version: ${{ github.event.inputs.version }}
          version_title: "Test Upload"
          changelog: "This is a test upload from GitHub Actions"
          publish_version: true
          tags: '["test", "github-actions"]'
          is_draft: true
